server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Public HTML can revalidate without `no-store`; this keeps SEO pages fresh
    # while allowing browser back/forward cache.
    location = / {
        etag off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 /;
    }

    location ~ ^/(.+/)?index\.html$ {
        return 301 /$1;
    }

    location ~* \.html$ {
        etag off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    location ~ ^/(branchen|kontakt|friseur|handwerker|reinigung|restaurant|autowerkstatt|selbststaendig|kosmetikstudio|fahrschule|immobilienmakler|versicherungsmakler|fitnessstudio|energieberater|hausverwaltung|ferienwohnung|impressum|datenschutz|agb|avv|sub-processors)/ {
        etag off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Explicit app deep links that must load the SPA shell. Everything else
    # should 404 instead of becoming an indexable soft-404 duplicate.
    location ~ ^/(admin|reset-password|dashboard|onboarding)(/.*)?$ {
        etag off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /index.html =404;
    }

    location / {
        etag off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location = /nav.js {
        etag on;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files /nav.js =404;
    }

    # Vite build assets have content hashes, public files like /nav.js do not.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss image/svg+xml;
}
