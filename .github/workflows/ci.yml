name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: cd apps/api && pnpm typecheck

      - name: Typecheck Web
        run: cd apps/web && pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate SEO pages
        run: pnpm seo:generate

      - name: Verify generated SEO artifacts are committed
        run: git diff --exit-code -- apps/web/public

      - name: Build Web
        run: cd apps/web && pnpm build

      - name: Audit SEO artifact
        run: pnpm seo:audit
