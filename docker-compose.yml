# SECURITY: only Caddy is exposed to the public internet.
# API, Web, Redis, DB are only reachable via the Docker network (caddy → api:3001, caddy → web:80).
# See Caddyfile for routing. To debug locally: "docker compose exec api sh" etc.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3001"
    env_file: apps/api/.env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      # Start order only — NO health condition: the API must boot (and serve
      # the DB-free voice path) even when the DB is down; migrate() retries.
      db:
        condition: service_started

  # Self-hosted Postgres (2026-07-05: replaces the paused Supabase project).
  # Internal-only (expose, never ports). DATABASE_URL in apps/api/.env points
  # at db:5432 with ?sslmode=disable; POSTGRES_PASSWORD comes from the
  # gitignored /opt/phonbot/.env (compose interpolation). Nightly pg_dump
  # backups via host cron into ./backups (see docs). RAM-capped for the 2GB VPS.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: postgres -c shared_buffers=128MB -c max_connections=60
    expose:
      - "5432"
    environment:
      POSTGRES_DB: phonbot
      POSTGRES_USER: phonbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in /opt/phonbot/.env}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phonbot -d phonbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 384m

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "80"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes --auto-aof-rewrite-percentage 100 --auto-aof-rewrite-min-size 64mb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  redis-data:
  caddy-data:
  caddy-config:
  db-data:
