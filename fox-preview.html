<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>Owly Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0F; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 52px; padding: 48px; font-family: -apple-system, system-ui, sans-serif; color: white; }
  h1 { font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 11px; color: rgba(255,255,255,0.3); }
  .glow { filter: drop-shadow(0 0 16px rgba(249,115,22,0.5)) drop-shadow(0 2px 40px rgba(249,115,22,0.18)); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .float { animation: float 3.5s ease-in-out infinite; }
  .brand { display:flex; align-items:center; gap:10px; font-size:34px; font-weight:900; letter-spacing:-0.02em; }
  .brand .p { color: white; }
  .brand .b { background: linear-gradient(135deg,#F97316,#FB923C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px 52px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .nav-demo { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:10px 16px; }
  .nav-brand { display:flex; align-items:center; gap:6px; font-size:16px; font-weight:900; }
</style>
</head>
<body>

<h1>🦉 Owly — Phonbot Mascot</h1>

<div class="row">

  <!-- Sizes -->
  <div class="item">

      <ellipse cx="32" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(-12 32 18)"/><ellipse cx="68" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(12 68 18)"/>
      <circle cx="50" cy="55" r="40" fill="url(#a1)"/>
      <circle cx="34" cy="52" r="15" fill="#FFFBEB"/><circle cx="66" cy="52" r="15" fill="#FFFBEB"/>
      <circle cx="34" cy="52" r="12" fill="url(#b1)"/><circle cx="66" cy="52" r="12" fill="url(#b1)"/>
      <circle cx="35" cy="53" r="7" fill="#0C0A09"/><circle cx="67" cy="53" r="7" fill="#0C0A09"/>
      <circle cx="39" cy="47" r="3.5" fill="white"/><circle cx="71" cy="47" r="3.5" fill="white"/>
      <path d="M46 65 L50 71 L54 65 Q50 68 46 65Z" fill="#F97316"/>
      <circle cx="20" cy="62" r="8" fill="#FB923C" opacity="0.22"/><circle cx="80" cy="62" r="8" fill="#FB923C" opacity="0.22"/>
    </svg>
    <div class="label">20px</div>
  </div>

  <div class="item">
    <svg width="48" height="48" viewBox="0 0 100 100" fill="none">
      <defs><radialGradient id="a2" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#E8973A"/><stop offset="100%" stop-color="#92400E"/></radialGradient><radialGradient id="b2" cx="35%" cy="28%" r="68%"><stop offset="0%" stop-color="#FDE68A"/><stop offset="55%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#B45309"/></radialGradient></defs>
      <ellipse cx="32" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(-12 32 18)"/><ellipse cx="32" cy="18" rx="5" ry="8" fill="#B45309" transform="rotate(-12 32 18)"/>
      <ellipse cx="68" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(12 68 18)"/><ellipse cx="68" cy="18" rx="5" ry="8" fill="#B45309" transform="rotate(12 68 18)"/>
      <circle cx="50" cy="55" r="40" fill="url(#a2)"/>
      <ellipse cx="50" cy="40" rx="22" ry="16" fill="#C2710C" opacity="0.35"/>
      <circle cx="34" cy="52" r="15" fill="#FFFBEB"/><circle cx="66" cy="52" r="15" fill="#FFFBEB"/>
      <circle cx="34" cy="52" r="12" fill="url(#b2)"/><circle cx="66" cy="52" r="12" fill="url(#b2)"/>
      <circle cx="35" cy="53" r="7" fill="#0C0A09"/><circle cx="67" cy="53" r="7" fill="#0C0A09"/>
      <circle cx="39" cy="47" r="3.5" fill="white"/><circle cx="71" cy="47" r="3.5" fill="white"/>
      <circle cx="32" cy="56" r="1.5" fill="white" opacity="0.5"/><circle cx="64" cy="56" r="1.5" fill="white" opacity="0.5"/>
      <path d="M46 65 L50 71 L54 65 Q50 68 46 65Z" fill="#F97316"/>
      <circle cx="20" cy="62" r="8" fill="#FB923C" opacity="0.22"/><circle cx="80" cy="62" r="8" fill="#FB923C" opacity="0.22"/>
    </svg>
    <div class="label">48px</div>
  </div>

  <!-- HERO card -->
  <div class="card">
    <div class="float glow">
      <svg width="160" height="160" viewBox="0 0 100 100" fill="none">
        <defs>
          <radialGradient id="ah" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#E8973A"/><stop offset="100%" stop-color="#92400E"/></radialGradient>
          <radialGradient id="bh" cx="35%" cy="28%" r="68%"><stop offset="0%" stop-color="#FDE68A"/><stop offset="55%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#B45309"/></radialGradient>
        </defs>
        <ellipse cx="32" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(-12 32 18)"/>
        <ellipse cx="32" cy="18" rx="5" ry="8" fill="#B45309" transform="rotate(-12 32 18)"/>
        <ellipse cx="68" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(12 68 18)"/>
        <ellipse cx="68" cy="18" rx="5" ry="8" fill="#B45309" transform="rotate(12 68 18)"/>
        <circle cx="50" cy="55" r="40" fill="url(#ah)"/>
        <ellipse cx="50" cy="40" rx="22" ry="16" fill="#C2710C" opacity="0.35"/>
        <ellipse cx="50" cy="58" rx="30" ry="26" fill="#FEF3C7" opacity="0.22"/>
        <circle cx="34" cy="52" r="15" fill="#FFFBEB"/>
        <circle cx="66" cy="52" r="15" fill="#FFFBEB"/>
        <circle cx="34" cy="52" r="12" fill="url(#bh)"/>
        <circle cx="66" cy="52" r="12" fill="url(#bh)"/>
        <circle cx="35" cy="53" r="7" fill="#0C0A09"/>
        <circle cx="67" cy="53" r="7" fill="#0C0A09"/>
        <circle cx="39" cy="47" r="3.5" fill="white"/>
        <circle cx="71" cy="47" r="3.5" fill="white"/>
        <circle cx="32" cy="56" r="1.5" fill="white" opacity="0.5"/>
        <circle cx="64" cy="56" r="1.5" fill="white" opacity="0.5"/>
        <path d="M46 65 L50 71 L54 65 Q50 68 46 65Z" fill="#F97316"/>
        <circle cx="20" cy="62" r="8" fill="#FB923C" opacity="0.22"/>
        <circle cx="80" cy="62" r="8" fill="#FB923C" opacity="0.22"/>
        <ellipse cx="50" cy="91" rx="20" ry="8" fill="#C2710C" opacity="0.25"/>
      </svg>
    </div>
    <div class="brand"><span class="p">Phon</span><span class="b">bot</span></div>
  </div>

  <!-- Nav demo -->
  <div class="item">
    <div class="nav-demo">
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
        <defs><radialGradient id="an" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#E8973A"/><stop offset="100%" stop-color="#92400E"/></radialGradient><radialGradient id="bn" cx="35%" cy="28%" r="68%"><stop offset="0%" stop-color="#FDE68A"/><stop offset="55%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#B45309"/></radialGradient></defs>
        <ellipse cx="32" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(-12 32 18)"/><ellipse cx="68" cy="18" rx="9" ry="13" fill="#92400E" transform="rotate(12 68 18)"/>
        <circle cx="50" cy="55" r="40" fill="url(#an)"/>
        <circle cx="34" cy="52" r="15" fill="#FFFBEB"/><circle cx="66" cy="52" r="15" fill="#FFFBEB"/>
        <circle cx="34" cy="52" r="12" fill="url(#bn)"/><circle cx="66" cy="52" r="12" fill="url(#bn)"/>
        <circle cx="35" cy="53" r="7" fill="#0C0A09"/><circle cx="67" cy="53" r="7" fill="#0C0A09"/>
        <circle cx="39" cy="47" r="3.5" fill="white"/><circle cx="71" cy="47" r="3.5" fill="white"/>
        <path d="M46 65 L50 71 L54 65 Q50 68 46 65Z" fill="#F97316"/>
        <circle cx="20" cy="62" r="8" fill="#FB923C" opacity="0.22"/><circle cx="80" cy="62" r="8" fill="#FB923C" opacity="0.22"/>
      </svg>
      <div class="nav-brand"><span class="p" style="color:white">Phon</span><span style="background:linear-gradient(135deg,#F97316,#FB923C);-webkit-background-clip:text;-webkit-text-fill-color:transparent">bot</span></div>
    </div>
    <div class="label">navbar</div>
  </div>

</div>

<div style="color:rgba(255,255,255,0.15);font-size:12px;">
  Start: <code style="color:#F97316">start-dev.bat</code> → localhost:3000
</div>

</body>
</html>
